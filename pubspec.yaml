name: peruse
description: "Interactive English learning application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  http: ^1.2.2
  audioplayers: ^6.1.0
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  drift_flutter: ^0.3.0
  permission_handler: ^11.4.0
  uuid: ^4.5.1
  connectivity_plus: ^7.1.1
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  google_mlkit_image_labeling: ^0.14.2
  drift: ^2.25.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol
  genkit_google_genai: ^0.2.7
  genkit: ^0.13.2
  schemantic: ^0.1.3


  meta: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.25.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/image_placeholder.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"


