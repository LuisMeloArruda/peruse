publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^5.1.0
  meta: ^1.17.0
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  google_sign_in: ^6.2.1
  drift: ^2.20.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  riverpod_generator: ^4.0.3
  drift_dev: ^2.20.0

flutter:
